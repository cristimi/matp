server {
    listen 80;
    server_name localhost;

    # Order Listener webhook & API
    # Using a trailing slash in the location path and ensuring the rewrite handles the remainder correctly
    location /api/listener/ {
        # Ensure we capture everything after /api/listener/
        rewrite ^/api/listener/(.*)$ /$1 break;
        proxy_pass http://order-listener:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Webhook-Signature $http_x_webhook_signature;
    }

    # Order Generator API
    location /api/generator/ {
        rewrite ^/api/generator/(.*)$ /$1 break;
        proxy_pass http://order-generator:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Dashboard REST API
    location /api/dashboard/ {
        rewrite ^/api/dashboard/(.*)$ /$1 break;
        proxy_pass http://dashboard-api:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket for live order feed
    location /ws/ {
        proxy_pass http://dashboard-api:8003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Dashboard UI (React SPA) - Assets
    location /assets/ {
        proxy_pass http://dashboard-ui:3000/assets/;
    }

    # Dashboard UI (React SPA) - Index
    location / {
        proxy_pass http://dashboard-ui:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
