server {
    listen 80;
    server_name localhost;

    # Docker's embedded DNS — re-resolve upstream hostnames every 5 s.
    # The variable-based proxy_pass below is required for this to take effect.
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 3s;

    # Order Listener webhook & API
    location /api/listener/ {
        set $upstream http://order-listener:8001;
        rewrite ^/api/listener/(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Webhook-Signature $http_x_webhook_signature;
    }

    # Order Generator API
    location /api/generator/ {
        set $upstream http://order-generator:8002;
        rewrite ^/api/generator/(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Dashboard REST API
    location /api/dashboard/ {
        set $upstream http://dashboard-api:8003;
        rewrite ^/api/dashboard/(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket for live order feed
    location /ws/ {
        set $upstream http://dashboard-api:8003;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Dashboard UI (React SPA) - Assets
    location /assets/ {
        set $upstream http://dashboard-ui:3000;
        proxy_pass $upstream/assets/;
    }

    # Dashboard UI (React SPA) - Index
    location / {
        set $upstream http://dashboard-ui:3000;
        proxy_pass $upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
