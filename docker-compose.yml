networks:
  matp_net:

volumes:
  postgres_data:
  logs:
  strategy_configs:

services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      order-listener:
        condition: service_healthy
      order-generator:
        condition: service_started
      dashboard-api:
        condition: service_healthy
      dashboard-ui:
        condition: service_started
      strategy-tester:
        condition: service_healthy
      tester-ui:
        condition: service_started
    networks: [matp_net]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: matp
      POSTGRES_USER: matp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [matp_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks: [matp_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-listener:
    build: ./order-listener
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://matp:matp@postgres:5432/matp
      REDIS_URL: redis://redis:6379
      EXECUTOR_URL: http://order-executor:8004
      MASTER_KEY: ${MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      order-executor:
        condition: service_healthy
    networks: [matp_net]
    restart: unless-stopped
    volumes:
      - logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-generator:
    build: ./order-generator
    environment:
      DATABASE_URL: postgresql://matp:matp@postgres:5432/matp
      LISTENER_WEBHOOK_URL: http://order-listener:8001/webhook
      DATA_FEED_EXCHANGE: ${DATA_FEED_EXCHANGE:-binance}
    volumes:
      - strategy_configs:/app/strategies_config
    depends_on:
      order-listener:
        condition: service_started
      postgres:
        condition: service_healthy
    networks: [matp_net]
    restart: unless-stopped

  order-executor:
    build: ./order-executor
    environment:
      DATABASE_URL: postgresql://matp:matp@postgres:5432/matp
      REDIS_URL: redis://redis:6379
      MASTER_KEY: ${MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [matp_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard-api:
    build: ./dashboard-api
    environment:
      DATABASE_URL: postgresql://matp:matp@postgres:5432/matp
      REDIS_URL: redis://redis:6379
      GENERATOR_URL: http://order-generator:8002
      LISTENER_URL: http://order-listener:8001
      EXECUTOR_URL: http://order-executor:8004
      AI_SIGNAL_GENERATOR_URL: http://ai-signal-generator:8005
      PUBLIC_HOST: ${PUBLIC_HOST:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [matp_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard-ui:
    build: ./dashboard-ui
    environment:
      VITE_API_BASE: /api/dashboard
      VITE_WS_URL: /ws/orders
    depends_on:
      dashboard-api:
        condition: service_healthy
    networks: [matp_net]
    restart: unless-stopped

  ai-signal-generator:
    build: ./ai-signal-generator
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://matp:matp@postgres:5432/matp}
      REDIS_URL: redis://redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CRYPTOPANIC_API_KEY: ${CRYPTOPANIC_API_KEY}
      MATP_LISTENER_URL: http://order-listener:8001
      MATP_EXECUTOR_URL: http://order-executor:8004
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      order-listener:
        condition: service_healthy
      order-executor:
        condition: service_healthy
    networks: [matp_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  strategy-tester:
    build:
      context: .
      dockerfile: strategy-tester/Dockerfile
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql://matp:matp@postgres:5432/matp
      REDIS_URL: redis://redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TESTER_DEFAULT_BALANCE: ${TESTER_DEFAULT_BALANCE:-1000.0}
      TESTER_DEFAULT_SLIPPAGE_PCT: ${TESTER_DEFAULT_SLIPPAGE_PCT:-0.05}
      TESTER_DEFAULT_FEE_PCT: ${TESTER_DEFAULT_FEE_PCT:-0.02}
      TESTER_MAX_CONCURRENT_RUNS: ${TESTER_MAX_CONCURRENT_RUNS:-1}
      TESTER_LLM_FAILURE_THRESHOLD: ${TESTER_LLM_FAILURE_THRESHOLD:-0.05}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [matp_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  tester-ui:
    build: ./tester-ui
    depends_on:
      strategy-tester:
        condition: service_healthy
    networks: [matp_net]
    restart: unless-stopped
